<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector Pro</title>
    <!-- نفس الـ CSS السابق -->
    <style>
        /* استخدم نفس الـ CSS من الكود السابق */
        body { background: linear-gradient(to right, #1e3c72, #2a5298); font-family: Arial, sans-serif; color: white; text-align: center; padding: 50px; margin: 0; }
        .container { background: rgba(255,255,255,0.95); color: #333; padding: 30px; border-radius: 15px; width: 90%; max-width: 600px; margin: auto; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        h1 { font-size: 2.5em; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; padding: 15px; border-radius: 10px; border: 2px solid #ddd; resize: vertical; font-size: 16px; box-sizing: border-box; font-family: Arial, sans-serif; }
        textarea:focus { outline: none; border-color: #2a5298; }
        button { margin-top: 20px; padding: 15px 40px; border: none; border-radius: 10px; background: #2a5298; color: white; font-size: 18px; cursor: pointer; transition: all 0.3s; font-weight: bold; }
        button:hover { background: #1e3c72; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        #loading { display: none; margin-top: 20px; font-size: 18px; }
        #result { margin-top: 25px; padding: 20px; border-radius: 10px; font-size: 22px; font-weight: bold; text-align: center; min-height: 60px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .true { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .fake { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        .error { background: #fff3cd; color: #856404; border: 2px solid #ffeaa7; }
    </style>
</head>
<body>
    <h1>📰 Fake News Detector PRO</h1>
    <div class="container">
        <textarea id="article" placeholder="Enter news article text here..."></textarea><br>
        <button id="checkBtn" onclick="checkNews()">🔍 Check News</button>
        <div id="loading">⏳ Analyzing...</div>
        <div id="result"></div>
    </div>

<script>
function checkNews() {
    const resultDiv = document.getElementById("result");
    const loadingDiv = document.getElementById("loading");
    const checkBtn = document.getElementById("checkBtn");
    const articleText = document.getElementById("article").value.trim();

    if (!articleText) {
        showResult("⚠️ Please enter some text!", "error");
        return;
    }

    checkBtn.disabled = true;
    checkBtn.textContent = "Analyzing...";
    loadingDiv.style.display = "block";
    resultDiv.innerHTML = "";

    setTimeout(() => {
        try {
            analyzeArticle(articleText);
        } catch (error) {
            showResult("❌ Error! Try again.", "error");
        } finally {
            checkBtn.disabled = false;
            checkBtn.textContent = "🔍 Check News";
            loadingDiv.style.display = "none";
        }
    }, 1200);
}

function analyzeArticle(text) {
    const resultDiv = document.getElementById("result");
    const lowerText = text.toLowerCase();
    const wordCount = text.split(/\s+/).filter(w => w.length > 0).length;
    
    const strongFakeWords = ['🚨', 'عاجل', 'شوكة', 'كسرنا', 'فضيحة', 'حصري', 'سري', 'مخفي', 'خطير', 'صادم'];
    const clickbaitWords = ['لا تصدق', 'لن تصدق', 'ستصدم', 'مذهل', 'رهيب', 'مخيف'];
    const conspiracyWords = ['مؤامرة', 'خطة سرية', 'الحقيقة المخفية', 'يكشفون'];
    
    let fakeScore = 0;
    

    if (text.includes('🚨') || text.includes('😱') || text.includes('⚠️')) fakeScore += 25;
    

    const strongCount = strongFakeWords.filter(word => lowerText.includes(word)).length;
    fakeScore += strongCount * 20;
    
    
    const clickbaitCount = clickbaitWords.filter(word => lowerText.includes(word)).length;
    fakeScore += clickbaitCount * 15;
    
    
    const conspiracyCount = conspiracyWords.filter(word => lowerText.includes(word)).length;
    fakeScore += conspiracyCount * 30;
    
    
    const exclamationCount = (text.match(/!/g) || []).length;
    if (exclamationCount > 2) fakeScore += 10;
    
    
    const upperCaseCount = (text.match(/[أ-يA-Z]/g) || []).length;
    const upperRatio = upperCaseCount / text.length;
    if (upperRatio > 0.2) fakeScore += 15;
    

    if (wordCount < 15 && fakeScore > 20) fakeScore += 25;
    
    
    if (fakeScore >= 35) {
        showResult(`🚨 FAKE NEWS ${Math.min(fakeScore, 100).toFixed(0)}% ❌<br><small>علامات: إيموجي تحذير + كلمات مثيرة</small>`, "fake");
    } else {
        showResult(`✅ REAL NEWS ${Math.max(0, 100 - fakeScore).toFixed(0)}% <br><small>نص طبيعي وموثوق</small>`, "true");
    }
}

function showResult(message, type) {
    document.getElementById("result").innerHTML = message;
    document.getElementById("result").className = type;
}


document.getElementById("article").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        checkNews();
    }
});
</script>
</body>
</html>
