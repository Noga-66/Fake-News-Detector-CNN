<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector</title>

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            font-family: Arial;
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 50%;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        textarea {
            width: 90%;
            height: 150px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            resize: none;
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            background: #2a5298;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        #loading {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>📰 Fake News Detection</h1>

    <div class="container">
        <textarea id="article" placeholder="Enter news article here..."></textarea><br>

        <button onclick="checkNews()">Check</button>

        <div id="loading">⏳ Checking...</div>

        <div id="result"></div>
    </div>

<script>
function checkNews() {
    let text = document.getElementById("article").value;

    document.getElementById("loading").style.display = "block";
    document.getElementById("result").innerText = "";

    setTimeout(() => {
        document.getElementById("loading").style.display = "none";

        // Fake simple logic for demo
        if (text.length > 100) {
            document.getElementById("result").innerText = "True News ✅";
        } else {
            document.getElementById("result").innerText = "Fake News ❌";
        }

    }, 1000);
}
</script>

</body>
</html>
