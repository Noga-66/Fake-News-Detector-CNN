<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector</title>

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            font-family: Arial;
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 50%;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        textarea {
            width: 90%;
            height: 150px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            resize: none;
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            background: #2a5298;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        #loading {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>📰 Fake News Detection</h1>

    <div class="container">
        <textarea id="article" placeholder="Enter news article here..."></textarea><br>

        <button onclick="checkNews()">Check</button>

        <div id="loading">⏳ Checking...</div>

        <div id="result"></div>
    </div>

    <script>
        function checkNews() {
            let text = document.getElementById("article").value;

            document.getElementById("loading").style.display = "block";
            document.getElementById("result").innerText = "";

            fetch("https://your-api.onrender.com/predict", {   
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({text: text})
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("loading").style.display = "none";
                document.getElementById("result").innerText = data.result;
            })
            .catch(err => {
                document.getElementById("loading").style.display = "none";
                document.getElementById("result").innerText = "Error connecting to server ❌";
            });
        }
    </script>

</body>
</html>
